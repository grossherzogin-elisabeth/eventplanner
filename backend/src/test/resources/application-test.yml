# -----------------
# Env Variables
# -----------------

# The password we use to encrypt PII data in our database
DATA_ENCRYPTION_PASSWORD: super-secret-password

# -----------------
# Overwrites
# -----------------

notifications:
  added-to-waiting-list:
    enabled: true
  removed-from-waiting-list:
    enabled: true
  added-to-crew:
    enabled: true
  removed-from-crew:
    enabled: true
  confirm-participation-request:
    enabled: true
  confirm-participation-reminder:
    enabled: true
  crew-registration-canceled:
    enabled: true
  crew-registration-added:
    enabled: true
  user-data-changed:
    enabled: true
  qualification-added:
    enabled: true
  qualification-updated:
    enabled: true
  qualification-removed:
    enabled: true
  qualification-close-to-expired:
    enabled: true
  qualification-expired:
    enabled: true

data:
  directory: src/test/resources

server:
  protocol: http
  host: localhost

security:
  enable-csrf: false

spring:
  datasource:
    hikari:
      # The in-memory database ceases to exist as soon as the database connection is closed. Every :memory: database is
      # distinct from every other. So, opening two database connections each with the filename ":memory:" will create
      # two independent in-memory databases, which we don't want here.
      maximum-pool-size: 1
      max-lifetime: 0
    url: 'jdbc:sqlite::memory:'
  flyway:
    clean-disabled: false
    locations:
      - classpath:db/migration
      - classpath:db/testdata


logging:
  level:
    org.eventplanner: DEBUG

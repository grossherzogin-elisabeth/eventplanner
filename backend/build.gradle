plugins {
    id "java"
    id "jacoco"
    id "org.springframework.boot" version "4.0.6"
    id "io.spring.dependency-management" version "1.1.7"
    id "io.freefair.lombok" version "9.4.0"
    id "org.sonarqube" version "7.1.0.6387"
}

group = "org.eventplanner"
version = "1.3.3-SNAPSHOT"

java {
    sourceCompatibility = "25"
}

ext {
    springBootVersion = "4.0.6"
    hibernateVersion = "6.6.13.Final"
    apachePoiVersion = "5.5.1"
}

repositories {
    mavenCentral()
}

dependencies {
    // spring
    implementation "org.springframework.boot:spring-boot-starter-oauth2-client:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-security:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-webmvc:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-data-jpa:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-freemarker:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-mail:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-validation:${springBootVersion}"

    // Adds support for java.time.LocalDate and java.time.Instant parsing
    implementation "com.fasterxml.jackson.datatype:jackson-datatype-jsr310"
    runtimeOnly("org.springframework.boot:spring-boot-properties-migrator")
    // sqlite
    implementation "org.xerial:sqlite-jdbc:3.53.0.0"
    implementation "org.hibernate.orm:hibernate-community-dialects"
    implementation "org.flywaydb:flyway-core:11.20.1"

    // excel
    implementation "org.apache.poi:poi:${apachePoiVersion}"
    implementation "org.apache.poi:poi-ooxml:${apachePoiVersion}"

    // tests
    implementation "org.springframework.boot:spring-boot-starter-security-test:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-webmvc-test:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-data-jpa-test:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-freemarker-test:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-mail-test:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-validation-test:${springBootVersion}"
    implementation "org.springframework.boot:spring-boot-starter-restclient-test:${springBootVersion}"
    testImplementation "org.springframework.security:spring-security-test:7.0.5"
    testImplementation "com.tngtech.archunit:archunit:1.4.2"

    // silence "unknown enum constant javax.annotation.meta.When.MAYBE" warning
    // https://stackoverflow.com/questions/53326271/spring-nullable-annotation-generates-unknown-enum-constant-warning
    // https://mvnrepository.com/artifact/com.google.code.findbugs/jsr305
    implementation "com.google.code.findbugs:jsr305:3.0.2"

    // monitoring
    runtimeOnly "io.micrometer:micrometer-registry-prometheus"

    // util
    implementation "org.apache.commons:commons-lang3:3.20.0"
}

test {
    useJUnitPlatform()
    testLogging.showStandardStreams = true
}

jacocoTestReport {
    dependsOn test // tests are required to run before generating the report

    reports {
        xml.required = true
    }
}

sonar {
    properties {
        property "sonar.projectKey", "grossherzogin-elisabeth_eventplanner"
        property "sonar.organization", "grossherzogin-elisabeth"
        property "sonar.java.coveragePlugin", "jacoco"
        property "sonar.plugins.downloadOnlyRequired", true
        property "sonar.coverage.jacoco.xmlReportPaths", "backend/build/reports/jacoco/test/jacocoTestReport.xml"
        property "sonar.javascript.lcov.reportPaths", "frontend/coverage/lcov.info"
        property "sonar.sources", "backend/src/main/java, frontend/src"
        property "sonar.tests", "backend/src/test/java, frontend/test"
    }
}
